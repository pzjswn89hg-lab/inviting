<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Теннис болзоо · Урилга</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e5e0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .emoji-big {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .title em {
      font-style: italic;
      color: #1D9E75;
    }

    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin: 1.25rem 0 2rem;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #ddd;
      background: #fff;
      color: #1a1a1a;
      transition: transform 0.15s, background 0.15s;
    }

    .btn:hover { background: #f5f5f0; }
    .btn:active { transform: scale(0.97); }

    .btn-yes {
      background: #1D9E75;
      color: #fff;
      border-color: #1D9E75;
    }

    .btn-yes:hover { background: #0F6E56; border-color: #0F6E56; }

    .error-msg {
      font-size: 13px;
      color: #999;
      margin-top: 0.75rem;
      min-height: 20px;
    }

    .result {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .detail-box {
      background: #f5f5f0;
      border-radius: 10px;
      padding: 1rem;
    }

    .detail-label {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .closing {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Урилга -->
    <div id="invite">
      <span class="emoji-big">🎾</span>
      <p class="subtitle">Онцгой урилга</p>
      <h1 class="title">Чи надтай <em>теннис</em> тоглоход гарах уу?</h1>
      <p class="desc">
        Кортон дээр хоёулаа тоглоод, ялагчаа шалгаад —<br>
        тэр мөчийг хамт туулъя гэж бодлоо. 🌿
      </p>
      <div class="btn-group">
        <button class="btn btn-yes" onclick="handleYes()">Тийм ✨</button>
        <button class="btn" id="noBtn" onclick="handleNo()">Үгүй</button>
      </div>
      <p class="error-msg" id="errMsg"></p>
    </div>

    <!-- Үр дүн -->
    <div class="result" id="result">
      <span style="font-size:2.5rem; display:block; margin-bottom:1rem;">🥰</span>
      <p class="result-title">Баярлалаа! Болзоо маань ингэж болоо:</p>
      <div class="detail-grid">
        <div class="detail-box">
          <p class="detail-label">📅 Огноо</p>
          <p class="detail-value" id="detailDate">—</p>
        </div>
        <div class="detail-box">
          <p class="detail-label">🕐 Цаг</p>
          <p class="detail-value" id="detailTime">—</p>
        </div>
        <div class="detail-box" style="grid-column: 1/-1;">
          <p class="detail-label">📍 Газар</p>
          <p class="detail-value" id="detailPlace">—</p>
        </div>
      </div>
      <p class="closing">Тэр өдрийг тэсэн ядан хүлээж байна… 💕</p>
    </div>

  </div>

  <script>
    // ✏️ ЭНЭ ХЭСГИЙГ ӨӨРЧИЛ
    const DATE  = "8 сарын 25";          // Огноо
    const TIME  = "Өглөөний 10:00";      // Цаг
    const PLACE = "Теннисний корт";       // Газар

    document.getElementById('detailDate').textContent  = DATE;
    document.getElementById('detailTime').textContent  = TIME;
    document.getElementById('detailPlace').textContent = PLACE;

    let noCount = 0;

    function handleYes() {
      document.getElementById('invite').style.display = 'none';
      document.getElementById('result').style.display = 'block';
    }

    function handleNo() {
      noCount++;
      const btn = document.getElementById('noBtn');
      const err = document.getElementById('errMsg');

      const msgs = [
        'Аль нэгийг нь сонгоорой 🙈',
        'Тийм гэж дахин бодоорой 😏',
        'Зөв товчийг дар... 😄',
        'Үгүй гэж байхгүй шүү! 🎾',
      ];

      err.textContent = msgs[Math.min(noCount - 1, msgs.length - 1)];

      const size = Math.max(100 - noCount * 15, 30);
      btn.style.fontSize = size + '%';
      btn.style.padding = Math.max(12 - noCount * 2, 4) + 'px ' + Math.max(28 - noCount * 5, 8) + 'px';
    }
  </script>
</body>
</html>
